<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión Librería</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container mt-5">
    <h1 class="text-center mb-4">📚 Gestión de Autores</h1>

    <div class="card p-4 mb-5">
        <form th:action="@{/autores/guardar}" th:object="${autor}" method="post">
            <input type="hidden" th:field="*{id}" />

            <div class="row g-3">
                <div class="col-md-10">
                    <input type="text" th:field="*{nombre}" class="form-control" placeholder="Nombre del autor" />
                    <!-- Mensaje de error de validación -->
                    <div th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}" class="text-danger mt-1 small"></div>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">Guardar</button>
                </div>
            </div>
        </form>
    </div>

    <div class="card p-3">
        <table class="table table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th style="width: 10%">ID</th>
                <th>Nombre</th>
                <th>Libros</th> <!-- Columna nueva -->
                <th style="width: 20%" class="text-center">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="a : ${autores}">
                <td th:text="${a.id}"></td>
                <td th:text="${a.nombre}"></td>
                <td>
                    <ul class="mb-0 ps-3">
                        <li th:each="libro : ${a.libros}" th:text="${libro.titulo}"></li>
                    </ul>
                </td>
                <td class="text-center">
                    <a th:href="@{/autores/editar/{id}(id=${a.id})}" class="btn btn-warning btn-sm me-2">✏️ Editar</a>
                    <a th:href="@{/autores/eliminar/{id}(id=${a.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('¿Estás seguro de eliminar este autor?');">🗑️ Eliminar</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
